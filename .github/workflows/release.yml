name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build and package app
        run: bash Scripts/package_app.sh

      - name: Create DMG
        run: |
          hdiutil create \
            -volname MD2 \
            -srcfolder dist/MD2.app \
            -ov \
            -format UDZO \
            dist/MD2-${{ github.ref_name }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MD2-${{ github.ref_name }}.dmg
          generate_release_notes: true
