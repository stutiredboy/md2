name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build and package app
        env:
          MARKDOWN2_VERSION: ${{ github.ref_name }}
        run: bash Scripts/package_app.sh

      - name: Create DMG
        run: |
          hdiutil create \
            -volname Markdown2 \
            -srcfolder dist/Markdown2.app \
            -ov \
            -format UDZO \
            dist/Markdown2-${{ github.ref_name }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Markdown2-${{ github.ref_name }}.dmg
          generate_release_notes: true
